name: ${DATASPACE_COMPOSE_PROJECT_NAME:-easy-dataspace}

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} --dbname=$${POSTGRES_DB}"]
  interval: 2s
  timeout: 5s
  retries: 30

x-crawler-env: &crawler-env
  my.edc.network.type: ${CRAWLER_NETWORK_TYPE:-local-demo-docker-compose}
  my.edc.participant.id: ${CRAWLER_PARTICIPANT_ID:-BPNL000001.CRAWLER}
  my.edc.fqdn: ${CRAWLER_PUBLIC_FQDN:-catalog-crawler.localhost:18400}
  crawler.environment.id: ${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}
  crawler.db.jdbc.url: jdbc:postgresql://portal-db:5432/${PORTAL_DB_NAME:-authority_portal}
  crawler.db.jdbc.user: ${PORTAL_DB_USER:-portal}
  crawler.db.jdbc.password: ${PORTAL_DB_PASSWORD:-portal}
  crawler.db.connection.pool.size: ${CRAWLER_DB_CONNECTION_POOL_SIZE:-30}
  crawler.db.connection.timeout.in.ms: ${CRAWLER_DB_CONNECTION_TIMEOUT_IN_MS:-30000}
  crawler.cron.online.connector.refresh: ${CRAWLER_CRON_ONLINE_CONNECTOR_REFRESH:-*/20 * * ? * *}
  crawler.cron.offline.connector.refresh: ${CRAWLER_CRON_OFFLINE_CONNECTOR_REFRESH:-0 */5 * ? * *}
  crawler.cron.dead.connector.refresh: ${CRAWLER_CRON_DEAD_CONNECTOR_REFRESH:-0 0 * ? * *}
  crawler.scheduled.kill.offline.connectors: ${CRAWLER_SCHEDULED_KILL_OFFLINE_CONNECTORS:-0 0 2 ? * *}
  crawler.kill.offline.connectors.after: ${CRAWLER_KILL_OFFLINE_CONNECTORS_AFTER:-P5D}
  crawler.hide.offline.data.offers.after: ${CRAWLER_HIDE_OFFLINE_DATA_OFFERS_AFTER:-P1D}
  crawler.num.threads: ${CRAWLER_NUM_THREADS:-8}
  crawler.max.data.offers.per.connector: ${CRAWLER_MAX_DATA_OFFERS_PER_CONNECTOR:-50}
  crawler.max.contract.offers.per.data.offer: ${CRAWLER_MAX_CONTRACT_OFFERS_PER_DATA_OFFER:-10}
  edc.oauth.provider.jwks.url: ${CRAWLER_DAPS_JWKS_URL:-http://keycloak.localhost:18080/realms/DAPS/protocol/openid-connect/certs}
  edc.oauth.token.url: ${CRAWLER_DAPS_TOKEN_URL:-http://keycloak.localhost:18080/realms/DAPS/protocol/openid-connect/token}

x-connector-env: &connector-env
  "sovity.deployment.kind": "${EDC_DEPLOYMENT_KIND:-control-plane-with-integrated-data-plane}"
  "sovity.environment": "${EDC_ENVIRONMENT:-production}"
  "sovity.management.api.iam.kind": "${EDC_MANAGEMENT_IAM_KIND:-management-iam-api-key}"
  "edc.api.auth.key": "${EDC_MANAGEMENT_API_KEY:-SomeOtherApiKey}"
  "sovity.dataspace.kind": "${EDC_DATASPACE_KIND:-sovity-daps}"
  "edc.oauth.provider.jwks.url": "${CONNECTOR_DAPS_JWKS_URL:-http://keycloak.localhost:18080/realms/DAPS/protocol/openid-connect/certs}"
  "edc.oauth.token.url": "${CONNECTOR_DAPS_TOKEN_URL:-http://keycloak.localhost:18080/realms/DAPS/protocol/openid-connect/token}"
  "sovity.http.protocol": "${EDC_HTTP_PROTOCOL:-http://}"
  "sovity.print.config": "${EDC_PRINT_CONFIG:-true}"
  "sovity.logging.level": "${EDC_LOGGING_LEVEL:-INFO}"

services:
  keycloak:
    image: ${KEYCLOAK_IMAGE:-ghcr.io/mjanez/dataspace-portal-keycloak:latest}
    pull_policy: ${KEYCLOAK_PULL_POLICY:-missing}
    command:
      - start-dev
      - --import-realm
      - --http-port=${KEYCLOAK_PORT:-18080}
      - --hostname=${KEYCLOAK_PUBLIC_URL:-http://keycloak.localhost:18080}
      - --hostname-strict=${KEYCLOAK_HOSTNAME_STRICT:-false}
      - --proxy-headers=${KEYCLOAK_PROXY_HEADERS:-xforwarded}
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "${KEYCLOAK_HEALTH_ENABLED:-true}"
      KEYCLOAK_PRIVACY_POLICY_URL: ${FRONTEND_PRIVACY_POLICY_URL:-http://portal.localhost:18000/privacy}
      KEYCLOAK_LEGAL_NOTICE_URL: ${FRONTEND_LEGAL_NOTICE_URL:-http://portal.localhost:18000/legal-notice}
    ports:
      - "${KEYCLOAK_PORT:-18080}:${KEYCLOAK_PORT:-18080}"
    volumes:
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /bin/bash -c "exec 3<>/dev/tcp/127.0.0.1/9000 &&
          printf 'GET /health/ready HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 &&
          head -1 <&3 | grep -q '200' ||
          (exec 3<>/dev/tcp/127.0.0.1/${KEYCLOAK_PORT:-18080} &&
          printf 'GET /realms/master HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 &&
          head -1 <&3 | grep -q '200')"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s
    networks:
      dataspace:
        aliases:
          - keycloak.localhost

  keycloak-config:
    image: ${KEYCLOAK_IMAGE:-ghcr.io/mjanez/dataspace-portal-keycloak:latest}
    pull_policy: ${KEYCLOAK_PULL_POLICY:-missing}
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_SERVER: ${KEYCLOAK_INTERNAL_URL:-http://keycloak.localhost:18080}
      PORTAL_URL: ${PORTAL_PUBLIC_URL:-http://portal.localhost:18000}
      DAPS_CLIENT_SECRET: ${DAPS_CLIENT_SECRET:-local-daps-secret}
      KEYCLOAK_AUTHORITY_REALM: ${KEYCLOAK_AUTHORITY_REALM:-authority-portal}
      KEYCLOAK_OAUTH2_PROXY_CLIENT_ID: ${KEYCLOAK_OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      KEYCLOAK_PORTAL_CLIENT_ID: ${KEYCLOAK_PORTAL_CLIENT_ID:-authority-portal-client}
    volumes:
      - ./keycloak/init.sh:/opt/keycloak-init/init.sh:ro
    entrypoint: ["/bin/bash", "/opt/keycloak-init/init.sh"]
    networks:
      - dataspace
    restart: "no"

  portal-db:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_USER: ${PORTAL_DB_USER:-portal}
      POSTGRES_PASSWORD: ${PORTAL_DB_PASSWORD:-portal}
      POSTGRES_DB: ${PORTAL_DB_NAME:-authority_portal}
    healthcheck: *postgres-healthcheck
    volumes:
      - portal-db-data:/var/lib/postgresql/data
    networks:
      - dataspace

  portal-backend:
    image: ${PORTAL_BACKEND_IMAGE:-ghcr.io/mjanez/dataspace-portal-backend:latest}
    depends_on:
      portal-db:
        condition: service_healthy
      keycloak-config:
        condition: service_completed_successfully
    environment:
      - quarkus.datasource.jdbc.url=jdbc:postgresql://portal-db:5432/${PORTAL_DB_NAME:-authority_portal}
      - quarkus.datasource.username=${PORTAL_DB_USER:-portal}
      - quarkus.datasource.password=${PORTAL_DB_PASSWORD:-portal}
      - quarkus.oidc.auth-server-url=${KEYCLOAK_PUBLIC_URL:-http://keycloak.localhost:18080}/realms/${KEYCLOAK_AUTHORITY_REALM:-authority-portal}
      - quarkus.keycloak.admin-client.server-url=${KEYCLOAK_INTERNAL_URL:-http://keycloak.localhost:18080}
      - quarkus.keycloak.admin-client.realm=${KEYCLOAK_AUTHORITY_REALM:-authority-portal}
      - quarkus.keycloak.admin-client.client-id=${KEYCLOAK_PORTAL_CLIENT_ID:-authority-portal-client}
      - quarkus.keycloak.admin-client.client-secret=${KEYCLOAK_PORTAL_CLIENT_SECRET:-NKV91vM0KfWeXzaNGaH6fF2z4o01tugl}
      - quarkus.keycloak.admin-client.grant-type=${KEYCLOAK_PORTAL_CLIENT_GRANT_TYPE:-CLIENT_CREDENTIALS}
      - quarkus.log.level=${PORTAL_BACKEND_LOG_LEVEL:-INFO}
      - quarkus.oidc-client.sovity.client-enabled=${PORTAL_SOVITY_OIDC_CLIENT_ENABLED:-false}
      - quarkus.oidc-client.sovity.auth-server-url=${PORTAL_SOVITY_OIDC_AUTH_SERVER_URL:-http://keycloak.localhost:18080/realms/authority-portal}
      - quarkus.oidc-client.sovity.client-id=${PORTAL_SOVITY_OIDC_CLIENT_ID:-authority-portal}
      - quarkus.oidc-client.sovity.credentials.secret=${PORTAL_SOVITY_OIDC_CLIENT_SECRET:-disabled}
      - authority-portal.caas.sovity.url=${PORTAL_CAAS_URL:-http://caas.disabled.localhost}
      - authority-portal.caas.sovity.limit-per-organization=${PORTAL_CAAS_LIMIT_PER_ORGANIZATION:-0}
      - authority-portal.base-url=${PORTAL_PUBLIC_URL:-http://portal.localhost:18000}
      - authority-portal.config.api-key=${PORTAL_CONFIG_API_KEY:-local-config-api-key}
      - authority-portal.invitation.expiration=${PORTAL_INVITATION_EXPIRATION:-43200}
      - authority-portal.organization.id.prefix=${PORTAL_ORGANIZATION_ID_PREFIX:-BPN}
      - authority-portal.organization.id.length=${PORTAL_ORGANIZATION_ID_LENGTH:-10}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.title=${PORTAL_DEPLOYMENT_TITLE:-Local Deployment}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.position=${PORTAL_DEPLOYMENT_POSITION:-0}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.data-catalog.hide-offline-data-offers-after=${PORTAL_CATALOG_HIDE_OFFLINE_DATA_OFFERS_AFTER:-15m}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.data-catalog.catalog-page-page-size=${PORTAL_CATALOG_PAGE_SIZE:-10}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.data-catalog.dataspace-names.default=${PORTAL_DEFAULT_DATASPACE_NAME:-Local Data Space}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.data-catalog.dataspace-names.connector-ids."${CONNECTOR_C_PARTICIPANT_ID:-BPNL000001.CONN003}"=${CONNECTOR_C_DATASPACE_NAME:-Partner Data Space}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.daps.url=${KEYCLOAK_INTERNAL_URL:-http://keycloak.localhost:18080}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.daps.realm-name=${DAPS_REALM:-DAPS}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.daps.client-id=${DAPS_CLIENT_ID:-authority-portal}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.daps.client-secret=${DAPS_CLIENT_SECRET:-local-daps-secret}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.central-components.catalog-crawler.client-id=${CRAWLER_PARTICIPANT_ID:-BPNL000001.CRAWLER}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.central-components.catalog-crawler.homepage-url=${CRAWLER_PUBLIC_URL:-http://catalog-crawler.localhost:18400}
      - authority-portal.deployment.environments.${PORTAL_DEPLOYMENT_ENVIRONMENT:-test}.central-components.catalog-crawler.endpoint-url=${CRAWLER_PUBLIC_URL:-http://catalog-crawler.localhost:18400}/api/v1/dsp
      - QUARKUS_CONFIG_LOCATIONS=/config/crawler/portal-central-component.properties
    volumes:
      - ./crawler/portal-central-component.properties:/config/crawler/portal-central-component.properties:ro
    networks:
      - dataspace

  portal-seed:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    depends_on:
      - portal-backend
    environment:
      PGPASSWORD: ${PORTAL_DB_PASSWORD:-portal}
      PORTAL_DB_USER: ${PORTAL_DB_USER:-portal}
      PORTAL_DB_NAME: ${PORTAL_DB_NAME:-authority_portal}
      PORTAL_PUBLIC_URL: ${PORTAL_PUBLIC_URL:-http://portal.localhost:18000}
      CONNECTOR_A_PUBLIC_URL: ${CONNECTOR_A_PUBLIC_URL:-http://connector-a.localhost:18100}
      CONNECTOR_B_PUBLIC_URL: ${CONNECTOR_B_PUBLIC_URL:-http://connector-b.localhost:18200}
      CONNECTOR_C_PUBLIC_URL: ${CONNECTOR_C_PUBLIC_URL:-http://connector-c.localhost:18300}
      CONNECTOR_A_INTERNAL_URL: http://connector-a.localhost:${CONNECTOR_A_PORT:-18100}
      CONNECTOR_B_INTERNAL_URL: http://connector-b.localhost:${CONNECTOR_B_PORT:-18200}
      CONNECTOR_C_INTERNAL_URL: http://connector-c.localhost:${CONNECTOR_C_PORT:-18300}
      CONNECTOR_A_PARTICIPANT_ID: ${CONNECTOR_A_PARTICIPANT_ID:-BPNL000001.CONN001}
      CONNECTOR_B_PARTICIPANT_ID: ${CONNECTOR_B_PARTICIPANT_ID:-BPNL000001.CONN002}
      CONNECTOR_C_PARTICIPANT_ID: ${CONNECTOR_C_PARTICIPANT_ID:-BPNL000001.CONN003}
    volumes:
      - ./portal/seed.sql:/seed.sql:ro
    command:
      - sh
      - -c
      - |
        until psql -h portal-db -U "$${PORTAL_DB_USER}" -d "$${PORTAL_DB_NAME}" -tAc "select to_regclass('public.connector') is not null" 2>/dev/null | grep -q t; do
          echo "Waiting for portal database migrations"
          sleep 2
        done
        psql -h portal-db -U "$${PORTAL_DB_USER}" -d "$${PORTAL_DB_NAME}" -v ON_ERROR_STOP=1 \
          -v portal_public_url="$${PORTAL_PUBLIC_URL}" \
          -v connector_a_public_url="$${CONNECTOR_A_PUBLIC_URL}" \
          -v connector_b_public_url="$${CONNECTOR_B_PUBLIC_URL}" \
          -v connector_c_public_url="$${CONNECTOR_C_PUBLIC_URL}" \
          -v connector_a_internal_url="$${CONNECTOR_A_INTERNAL_URL}" \
          -v connector_b_internal_url="$${CONNECTOR_B_INTERNAL_URL}" \
          -v connector_c_internal_url="$${CONNECTOR_C_INTERNAL_URL}" \
          -v connector_a_participant_id="$${CONNECTOR_A_PARTICIPANT_ID}" \
          -v connector_b_participant_id="$${CONNECTOR_B_PARTICIPANT_ID}" \
          -v connector_c_participant_id="$${CONNECTOR_C_PARTICIPANT_ID}" \
          -f /seed.sql
    networks:
      - dataspace
    restart: "no"

  portal-frontend:
    image: ${PORTAL_FRONTEND_IMAGE:-ghcr.io/mjanez/dataspace-portal-frontend:latest}
    pull_policy: ${PORTAL_FRONTEND_PULL_POLICY:-missing}
    environment:
      AUTHORITY_PORTAL_FRONTEND_BACKEND_URL: ${PORTAL_PUBLIC_URL:-http://portal.localhost:18000}
      AUTHORITY_PORTAL_FRONTEND_LOGIN_URL: ${FRONTEND_LOGIN_URL:-http://portal.localhost:18000/oauth2/start?rd=http%3A%2F%2Fportal.localhost%3A18000}
      AUTHORITY_PORTAL_FRONTEND_LOGOUT_URL: ${FRONTEND_LOGOUT_URL:-http://portal.localhost:18000/oauth2/sign_out?rd=http%3A%2F%2Fkeycloak.localhost%3A18080%2Frealms%2Fauthority-portal%2Fprotocol%2Fopenid-connect%2Flogout%3Fclient_id%3Doauth2-proxy%26post_logout_redirect_uri%3Dhttp%253A%252F%252Fportal.localhost%253A18000}
      AUTHORITY_PORTAL_FRONTEND_INVALIDATE_SESSION_COOKIES_URL: ${FRONTEND_INVALIDATE_SESSION_COOKIES_URL:-http://portal.localhost:18000/oauth2/sign_out}
      AUTHORITY_PORTAL_FRONTEND_UPDATE_PASSWORD_URL: ${FRONTEND_UPDATE_PASSWORD_URL:-http://keycloak.localhost:18080/realms/authority-portal/protocol/openid-connect/auth?response_type=code&client_id=oauth2-proxy&scope=openid&kc_action=UPDATE_PASSWORD&redirect_uri=http%3A%2F%2Fportal.localhost%3A18000%2Foauth2%2Fcallback}
      AUTHORITY_PORTAL_FRONTEND_PRIVACY_POLICY_URL: ${FRONTEND_PRIVACY_POLICY_URL:-http://portal.localhost:18000/privacy}
      AUTHORITY_PORTAL_FRONTEND_LEGAL_NOTICE_URL: ${FRONTEND_LEGAL_NOTICE_URL:-http://portal.localhost:18000/legal-notice}
      AUTHORITY_PORTAL_FRONTEND_SUPPORT_URL: ${FRONTEND_SUPPORT_URL:-http://portal.localhost:18000/support}
      AUTHORITY_PORTAL_FRONTEND_ACTIVE_PROFILE: ${FRONTEND_ACTIVE_PROFILE:-default}
      AUTHORITY_PORTAL_FRONTEND_DATASPACE_SHORT_NAME: ${FRONTEND_DATASPACE_SHORT_NAME:-MyDS}
      AUTHORITY_PORTAL_FRONTEND_PORTAL_DISPLAY_NAME: ${FRONTEND_PORTAL_DISPLAY_NAME:-My Data Space Portal}
      AUTHORITY_PORTAL_FRONTEND_ENABLE_DASHBOARD: "${FRONTEND_ENABLE_DASHBOARD:-false}"
      AUTHORITY_PORTAL_FRONTEND_BRAND_LOGO_URL: ${FRONTEND_BRAND_LOGO_URL:-}
      AUTHORITY_PORTAL_FRONTEND_BRAND_LOGO_SMALL_URL: ${FRONTEND_BRAND_LOGO_SMALL_URL:-}
      AUTHORITY_PORTAL_FRONTEND_BRAND_LOGO_LOGIN_URL: ${FRONTEND_BRAND_LOGO_LOGIN_URL:-}
      AUTHORITY_PORTAL_FRONTEND_BRAND_COPYRIGHT: ${FRONTEND_BRAND_COPYRIGHT:-}
    networks:
      - dataspace

  portal-auth-proxy:
    image: ${OAUTH2_PROXY_IMAGE:-quay.io/oauth2-proxy/oauth2-proxy:v7.5.0}
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
      keycloak-config:
        condition: service_completed_successfully
      portal-caddy:
        condition: service_started
    environment:
      OAUTH2_PROXY_PROVIDER: ${OAUTH2_PROXY_PROVIDER:-keycloak-oidc}
      OAUTH2_PROXY_PROVIDER_DISPLAY_NAME: ${OAUTH2_PROXY_PROVIDER_DISPLAY_NAME:-Keycloak}
      OAUTH2_PROXY_OIDC_ISSUER_URL: "${KEYCLOAK_PUBLIC_URL:-http://keycloak.localhost:18080}/realms/${KEYCLOAK_AUTHORITY_REALM:-authority-portal}"
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      OAUTH2_PROXY_COOKIE_REFRESH: ${OAUTH2_PROXY_COOKIE_REFRESH:-30s}
      OAUTH2_PROXY_COOKIE_EXPIRE: ${OAUTH2_PROXY_COOKIE_EXPIRE:-30m}
      OAUTH2_PROXY_COOKIE_SECURE: "${OAUTH2_PROXY_COOKIE_SECURE:-false}"
      OAUTH2_PROXY_COOKIE_DOMAINS: ${OAUTH2_PROXY_COOKIE_DOMAINS:-portal.localhost}
      OAUTH2_PROXY_CLIENT_ID: ${KEYCLOAK_OAUTH2_PROXY_CLIENT_ID:-oauth2-proxy}
      OAUTH2_PROXY_CLIENT_SECRET: ${KEYCLOAK_OAUTH2_PROXY_CLIENT_SECRET:-2iYFD9Ha8djYUa30r79kzvRUcZXfaeox}
      OAUTH2_PROXY_EMAIL_DOMAINS: "${OAUTH2_PROXY_EMAIL_DOMAINS:-*}"
      OAUTH2_PROXY_UPSTREAMS: "${OAUTH2_PROXY_UPSTREAMS:-http://portal-caddy:8081/}"
      OAUTH2_PROXY_API_ROUTES: "${OAUTH2_PROXY_API_ROUTES:-^/api/}"
      OAUTH2_PROXY_SKIP_AUTH_ROUTES: "${OAUTH2_PROXY_SKIP_AUTH_ROUTES:-^(/oauth2|/api/registration|/api/config)}"
      OAUTH2_PROXY_HTTP_ADDRESS: "${OAUTH2_PROXY_HTTP_ADDRESS:-0.0.0.0:8080}"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "${OAUTH2_PROXY_PASS_ACCESS_TOKEN:-true}"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "${OAUTH2_PROXY_SKIP_PROVIDER_BUTTON:-true}"
      OAUTH2_PROXY_SHOW_DEBUG_ON_ERROR: "${OAUTH2_PROXY_SHOW_DEBUG_ON_ERROR:-true}"
      OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_REDIRECT_URL:-http://portal.localhost:18000/oauth2/callback}"
      OAUTH2_PROXY_SCOPE: "${OAUTH2_PROXY_SCOPE:-openid profile email}"
      OAUTH2_PROXY_WHITELIST_DOMAINS: "${OAUTH2_PROXY_WHITELIST_DOMAINS:-keycloak.localhost:18080}"
      OAUTH2_PROXY_REVERSE_PROXY: "${OAUTH2_PROXY_REVERSE_PROXY:-true}"
    networks:
      - dataspace

  portal-caddy:
    image: ${CADDY_IMAGE:-caddy:2.8}
    depends_on:
      - portal-frontend
      - portal-backend
    ports:
      - "${PORTAL_PORT:-18000}:${PORTAL_PORT:-18000}"
    environment:
      PORTAL_PUBLIC_PORT: "${PORTAL_PORT:-18000}"
      BACKEND_UPSTREAM_HOST: portal-backend
      FRONTEND_UPSTREAM_HOST: portal-frontend
      AUTH_PROXY_UPSTREAM_HOST: portal-auth-proxy
    volumes:
      - ./portal/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      dataspace:
        aliases:
          - portal.localhost

  connector-a:
    image: ${CADDY_IMAGE:-caddy:2.8}
    depends_on:
      - connector-a-ui
      - connector-a-connector
    ports:
      - "${CONNECTOR_A_PORT:-18100}:${CONNECTOR_A_PORT:-18100}"
    environment:
      CONNECTOR_PUBLIC_PORT: "${CONNECTOR_A_PORT:-18100}"
      CONNECTOR_UPSTREAM_HOST: connector-a-connector
      FRONTEND_UPSTREAM_HOST: connector-a-ui
    volumes:
      - ./connectors/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      dataspace:
        aliases:
          - connector-a.localhost

  connector-a-ui:
    image: ${EDC_UI_IMAGE:-ghcr.io/sovity/edc-ce-ui:16.5.0}
    environment:
      NEXT_PUBLIC_MANAGEMENT_API_URL: ${CONNECTOR_MANAGEMENT_API_URL:-/api/management}
      NEXT_PUBLIC_MANAGEMENT_API_KEY: ${EDC_MANAGEMENT_API_KEY:-SomeOtherApiKey}
    networks:
      - dataspace

  connector-a-connector:
    image: ${EDC_IMAGE:-ghcr.io/sovity/edc-ce:16.5.0}
    depends_on:
      connector-a-db:
        condition: service_healthy
    env_file:
      - ./connectors/daps/connector-a-vault.env
    environment:
      <<: *connector-env
      "sovity.edc.fqdn.public": "${CONNECTOR_A_PUBLIC_FQDN:-connector-a.localhost:18100}"
      "sovity.edc.fqdn.internal": "${CONNECTOR_INTERNAL_FQDN:-localhost}"
      "sovity.jdbc.url": "jdbc:postgresql://connector-a-db:5432/${CONNECTOR_DB_NAME:-connector}"
      "sovity.jdbc.user": "${CONNECTOR_DB_USER:-connector}"
      "sovity.jdbc.password": "${CONNECTOR_DB_PASSWORD:-connector}"
      "edc.participant.id": "${CONNECTOR_A_PARTICIPANT_ID:-BPNL000001.CONN001}"
      "sovity.edc.title": "${CONNECTOR_A_TITLE:-Connector A}"
      "sovity.edc.description": "${CONNECTOR_A_DESCRIPTION:-Demo connector A}"
      "sovity.edc.maintainer.name": "${CONNECTOR_A_MAINTAINER_NAME:-Local Authority}"
      "sovity.edc.maintainer.url": "${CONNECTOR_A_MAINTAINER_URL:-http://portal.localhost:18000}"
      "sovity.edc.curator.name": "${CONNECTOR_A_CURATOR_NAME:-Local Authority}"
